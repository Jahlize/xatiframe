<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cybernetic Haven - Xat Frame</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        /* Contenedor principal del XatFrame */
        .xatframe-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            /* Reemplaza con tu imagen de fondo si es necesario, actualmente simula la ciudad cyberpunk */
            background: url('https://xatimg.com/image/aQcCfqntwxDZ.png') center center / cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Capa superpuesta para oscurecer u optimizar la vista del chat (opcional) */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
        }

        /* Contenedor del Marco */
        .frame-wrapper {
            position: relative;
            width: 90%;
            max-width: 1000px;
            height: 80%;
            max-height: 550px;
            z-index: 10;
            border: 15px solid transparent;
            /* Simulación del marco metálico texturizado con bordes cibernéticos */
            border-image: linear-gradient(135deg, #2b3a4a, #0f171e, #3a4f66, #0f171e) 1;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2), inset 0 0 20px rgba(0, 212, 255, 0.2);
            background: rgba(10, 15, 23, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 4px;
        }

        /* Espacio reservado para incrustar la aplicación o el chat de xat */
        .xat-chat-area {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }

        /* --- EFECTO DE HUMO ANIMADO --- */
        .smoke-container {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            z-index: 5; /* Por encima del fondo, por debajo del marco del chat */
            pointer-events: none; /* Permite hacer clic a través del humo */
            overflow: hidden;
            opacity: 0.65;
        }

        .smoke-particle {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            mix-blend-mode: screen;
            filter: blur(8px);
        }

        /* Humo Morado/Azul (Izquierda e Inferior) */
        .smoke-1 {
            bottom: -50px;
            left: -50px;
            width: 500px;
            height: 500px;
            background-image: radial-gradient(circle, rgba(138, 43, 226, 0.4) 0%, rgba(0, 0, 255, 0.1) 50%, transparent 70%);
            animation: drift-left 12s infinite linear alternate;
        }

        /* Humo Verde/Cyan (Derecha y Superior) */
        .smoke-2 {
            top: -50px;
            right: -50px;
            width: 600px;
            height: 600px;
            background-image: radial-gradient(circle, rgba(0, 255, 200, 0.3) 0%, rgba(0, 128, 128, 0.1) 60%, transparent 70%);
            animation: drift-right 16s infinite linear alternate;
        }

        /* Capa extra de humo ambiental flotante */
        .smoke-3 {
            top: 30%;
            left: 20%;
            width: 400px;
            height: 400px;
            background-image: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 60%);
            animation: drift-center 20s infinite ease-in-out alternate;
        }

        /* --- ANIMACIONES CSS --- */
        @keyframes drift-left {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
            }
            50% {
                transform: translate(30px, -40px) rotate(45deg) scale(1.1);
            }
            100% {
                transform: translate(-20px, -80px) rotate(90deg) scale(0.9);
            }
        }

        @keyframes drift-right {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(0.9);
            }
            50% {
                transform: translate(-40px, 30px) rotate(-60deg) scale(1.2);
            }
            100% {
                transform: translate(10px, 60px) rotate(-120deg) scale(1);
            }
        }

        @keyframes drift-center {
            0% {
                transform: translate(-50px, -50px) scale(1);
                opacity: 0.3;
            }
            50% {
                opacity: 0.6;
            }
            100% {
                transform: translate(50px, 50px) scale(1.3);
                opacity: 0.2;
            }
        }
    </style>
</head>
<body>

    <div class="xatframe-container">
        <div class="overlay"></div>

        <div class="smoke-container">
            <div class="smoke-particle smoke-1"></div>
            <div class="smoke-particle smoke-2"></div>
            <div class="smoke-particle smoke-3"></div>
        </div>

        <div class="frame-wrapper">
            <div class="xat-chat-area">
                </div>
        </div>
    </div>

</body>
</html>
